<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini E-Commerce</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>My Shop</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>

  <footer>
    <p>&copy; 2026 My Shop</p>
  </footer>

  <script src="script.js" defer></script>

</html>
